<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg?v=2" />
    <link rel="shortcut icon" href="/logo.svg?v=2" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DashDex - Pokémon Analytics</title>

    <!-- SEO Meta Tags -->
    <meta name="description" content="DashDex: Dashboard analítico de Pokémon con estadísticas, rankings, comparativas y explorador de datos." />
    <meta name="keywords" content="Pokémon,dashboard,analytics,estadísticas,rankings,comparador Pokémon,explorador Pokémon" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1" />
    <link rel="canonical" href="https://dashdex-593.vercel.app/" />

    <!-- Open Graph / Facebook -->
    <meta property="og:title" content="DashDex — Pokémon Analytics" />
    <meta property="og:description" content="Explora estadísticas, compara Pokémon, descubre rankings y analiza datos del mundo Pokémon con DashDex." />
    <meta property="og:image" content="https://dashdex-593.vercel.app/og-image.png" />
    <meta property="og:url" content="https://dashdex-593.vercel.app/" />
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="es_ES" />
    <meta property="og:site_name" content="DashDex" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="DashDex — Pokémon Analytics" />
    <meta name="twitter:description" content="Dashboard analítico de Pokémon con estadísticas, rankings y comparativas." />
    <meta name="twitter:image" content="https://dashdex-593.vercel.app/og-image.png" />

    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "DashDex",
      "url": "https://dashdex-593.vercel.app",
      "description": "Dashboard analítico de Pokémon",
      "applicationCategory": "DataAnalyticsApplication",
      "operatingSystem": "All",
      "inLanguage": "es",
      "offers": {
        "@type": "Offer",
        "price": "0"
      }
    }
    </script>
    <script>
      // Prevent flash of wrong theme on initial load
      (function() {
        try {
          const store = JSON.parse(localStorage.getItem('dashdex-store') || '{}');
          const theme = store.state?.theme || 'light';
          if (theme === 'light') {
            document.documentElement.classList.add('light');
          }
        } catch(e) {
          // Default to light theme
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
